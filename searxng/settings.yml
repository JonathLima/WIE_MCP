# See https://docs.searxng.org/admin/settings/settings.html#use-default-settings
use_default_settings: true
bot_detection: false

server:
  secret_key: "searxng-mcp-secret-key-change-in-production"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: ""
  formats:
    - html
    - json

engines:
  - name: google
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: bing
    disabled: false
  - name: wikipedia
    disabled: false
  - name: startpage
    disabled: false
  - name: ahmia
    disabled: true
  - name: torch
    disabled: true
  - name: radio browser
    disabled: true
